<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Dashboard OS</title>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white"><h4>Consulta de OS</h4></div>
            <div class="card-body">
                <form method="POST" class="row g-3">
                    <div class="col-auto"><input type="text" name="os_id" class="form-control" placeholder="ID da OS" value="{{ request.values.get('os_id', '') }}" required></div>
                    <div class="col-auto"><button class="btn btn-primary">Buscar</button></div>
                </form>

                {% if os %}
                    <div class="mt-4 p-3 border rounded bg-white">
                        <h5>OS #{{ os.id }}</h5>
                        <div class="row mb-3">
                            <div class="col-md-6"><strong>ID Cliente:</strong> {{ os.id_cliente }}</div>
                            <div class="col-md-6"><strong>Cliente:</strong> {{ os.cliente }}</div>
                        </div>
                        <p><strong>Status:</strong> {{ os.status_formatado }}</p>

                        {% if os.status_raw == 'F' %}
                            <form action="/update_os" method="POST" class="mt-3">
                                <input type="hidden" name="os_id" value="{{ os.id }}">
                                <label class="form-label fw-bold">Alterar Diagnóstico:</label>
                                
                                <input class="form-control" list="listaDiagnosticos" id="inputDiagnostico" placeholder="Digite para buscar..." autocomplete="off">
                                <datalist id="listaDiagnosticos">
                                    {% for d in diagn_list %}
                                        <option data-value="{{ d.id }}" value="{{ d.descricao }}">
                                    {% endfor %}
                                </datalist>
                                
                                <input type="hidden" name="id_diagnostico" id="id_diagnostico_hidden">
                                <button type="submit" class="btn btn-success w-100 mt-2">Atualizar</button>
                            </form>

                            <script>
                                document.getElementById('inputDiagnostico').addEventListener('input', function(e) {
                                    const input = e.target;
                                    const list = document.getElementById('listaDiagnosticos');
                                    const hiddenInput = document.getElementById('id_diagnostico_hidden');
                                    const option = Array.from(list.options).find(opt => opt.value === input.value);
                                    hiddenInput.value = option ? option.getAttribute('data-value') : '';
                                });
                            </script>
                        {% else %}
                            <div class="alert alert-warning mt-3">OS não finalizada.</div>
                        {% endif %}
                    </div>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
