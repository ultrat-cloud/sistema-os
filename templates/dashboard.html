<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard OS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white"><h4>Consulta de OS</h4></div>
            <div class="card-body">
                <form method="POST" class="row g-3">
                    <div class="col-auto">
                        <input type="text" name="os_id" class="form-control" placeholder="Digite o ID da OS" required>
                    </div>
                    <div class="col-auto"><button type="submit" class="btn btn-primary">Buscar</button></div>
                </form>

                {% if os %}
                <hr><h5>OS #{{ os.id }} - {{ os.assunto }}</h5>
                <p>Status: <span class="badge {{ 'bg-success' if os.status == 'F' else 'bg-warning' }}">{{ os.status }}</span></p>
                
                {% if os.status == 'F' %}
                <form action="/update_os" method="POST">
                    <input type="hidden" name="os_id" value="{{ os.id }}">
                    <div class="mb-3">
                        <label class="form-label">Selecione o Diagnóstico:</label>
                        <select name="id_diagnostico" class="form-select">
                            {% for d in diagn_list %}
                                <option value="{{ d.id_diagnostico }}">{{ d.nome_diagnostico }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Atualizar Diagnóstico</button>
                </form>
                {% endif %}
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
